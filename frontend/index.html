<!DOCTYPE html>
<html>
<head>
    <title>Abstract Improver</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>Research Abstract Improver</h2>

<textarea id="abstract" rows="10" placeholder="Paste your abstract..."></textarea>

<select id="style">
    <option value="medical journal">Medical Journal</option>
    <option value="IEEE">IEEE</option>

</select>

<button onclick="submitAbstract()">Improve</button>

<h3>Improved Abstract:</h3>
<div id="result"></div>

<script src="script.js"></script>
</body>
</html>
